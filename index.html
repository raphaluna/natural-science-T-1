<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Science — Year 5</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a6faa;--blue-light:#e3f0fa;--blue-mid:#378ADD;
  --green:#3a7d2e;--green-light:#eaf5e3;
  --teal:#0e7a6e;--teal-light:#e0f4f1;
  --amber:#b56a00;--amber-light:#fff3e0;
  --coral:#c0392b;--coral-light:#fdecea;
  --purple:#5c3d9e;--purple-light:#ede8fb;
  --gray:#444;--gray-light:#f5f5f5;--gray-mid:#e0e0e0;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Nunito Sans',sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh}
h1,h2,h3,.card-term{font-family:'Nunito',sans-serif}

/* HEADER */
.app-header{background:#fff;border-bottom:2px solid var(--blue-light);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-logo{display:flex;align-items:center;gap:10px}
.app-logo-icon{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-family:'Nunito',sans-serif;font-weight:800}
.app-logo-text{font-family:'Nunito',sans-serif;font-weight:800;font-size:17px;color:var(--text)}
.app-logo-sub{font-size:12px;color:var(--text3);font-weight:400}
.lang-toggle{display:flex;gap:4px;background:var(--gray-light);border-radius:20px;padding:3px}
.lang-btn{padding:5px 14px;font-size:13px;font-weight:700;border:none;border-radius:16px;cursor:pointer;background:transparent;color:var(--text3);font-family:'Nunito',sans-serif;transition:all .2s}
.lang-btn.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,0.12)}

/* TOPIC TABS */
.topic-bar{background:#fff;padding:0 16px;overflow-x:auto;display:flex;gap:4px;border-bottom:1px solid var(--gray-mid);scrollbar-width:none}
.topic-bar::-webkit-scrollbar{display:none}
.topic-tab{padding:12px 16px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;border:none;background:transparent;cursor:pointer;color:var(--text3);white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.topic-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ACTIVITY TABS */
.act-bar{padding:14px 16px 0;display:flex;gap:8px;flex-wrap:wrap}
.act-tab{padding:7px 16px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;border:2px solid var(--gray-mid);border-radius:20px;background:#fff;cursor:pointer;color:var(--text2);transition:all .2s}
.act-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* MAIN */
.main{max-width:700px;margin:0 auto;padding:20px 16px 40px}

/* SECTIONS */
.act-section{display:none}
.act-section.active{display:block}

/* TOPIC HEADER */
.topic-header{background:#fff;border-radius:var(--radius);padding:16px 20px;margin-bottom:18px;border-left:4px solid var(--blue);box-shadow:var(--shadow)}
.topic-header h2{font-size:17px;font-weight:800;color:var(--blue);margin-bottom:4px}
.topic-header p{font-size:13px;color:var(--text2);line-height:1.5}

/* FLASHCARDS */
.fc-wrap{perspective:900px;height:210px;cursor:pointer;margin-bottom:16px}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:var(--shadow)}
.fc-front{background:#fff;border:2px solid var(--blue-light)}
.fc-back{background:var(--blue-light);transform:rotateY(180deg);border:2px solid var(--blue-mid)}
.fc-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;font-family:'Nunito',sans-serif}
.card-term{font-size:22px;font-weight:800;color:var(--text);line-height:1.3}
.card-def{font-size:15px;font-weight:600;color:var(--blue);line-height:1.5;margin-bottom:8px}
.card-hint{font-size:13px;color:var(--text2);line-height:1.5;font-style:italic}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:4px}
.fc-count{font-size:13px;color:var(--text3);font-weight:700;min-width:60px;text-align:center}
.btn-circle{width:38px;height:38px;border-radius:50%;border:2px solid var(--gray-mid);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-circle:hover{border-color:var(--blue);color:var(--blue)}
.fc-hint-text{font-size:12px;color:var(--text3);text-align:center;margin-top:8px}

/* QUIZ */
.quiz-prog-bar{background:var(--gray-mid);border-radius:10px;height:6px;margin-bottom:16px;overflow:hidden}
.quiz-prog-fill{background:var(--blue);height:6px;border-radius:10px;transition:width .4s}
.quiz-prog-text{font-size:12px;color:var(--text3);font-weight:700;margin-bottom:8px}
.quiz-q{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.5;font-family:'Nunito',sans-serif}
.quiz-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.quiz-opt{padding:13px 16px;border:2px solid var(--gray-mid);border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;color:var(--text);background:#fff;text-align:left;font-family:'Nunito Sans',sans-serif;transition:all .2s}
.quiz-opt:hover:not(:disabled){border-color:var(--blue-mid);background:var(--blue-light)}
.quiz-opt.correct{background:#eaf5e3;border-color:#3a7d2e;color:#27500A}
.quiz-opt.wrong{background:#fdecea;border-color:#c0392b;color:#7a1a10}
.quiz-fb{padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;margin-bottom:12px;display:none}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:#eaf5e3;color:#27500A}
.quiz-fb.no{background:#fdecea;color:#7a1a10}
.score-box{text-align:center;padding:32px 20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow)}
.score-circle{width:100px;height:100px;border-radius:50%;background:var(--blue-light);border:4px solid var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px}
.score-num{font-size:30px;font-weight:800;color:var(--blue);font-family:'Nunito',sans-serif;line-height:1}
.score-denom{font-size:13px;color:var(--text3);font-weight:600}
.score-msg{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:20px}

/* DRAG */
.drag-inst{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:600}
.drag-bank{display:flex;flex-wrap:wrap;gap:8px;padding:14px;border:2px dashed var(--gray-mid);border-radius:var(--radius);min-height:58px;margin-bottom:18px;background:#fff}
.drag-chip{padding:7px 14px;font-size:13px;font-weight:700;border:2px solid var(--gray-mid);border-radius:20px;background:#fff;cursor:grab;color:var(--text);user-select:none;transition:all .2s;font-family:'Nunito',sans-serif}
.drag-chip:hover{border-color:var(--blue);background:var(--blue-light)}
.drag-chip.dragging{opacity:.5}
.drag-chip.correct{background:#eaf5e3;border-color:#3a7d2e;color:#27500A;cursor:default}
.drag-chip.wrong{background:#fdecea;border-color:#c0392b;color:#7a1a10}
.drop-zones{display:flex;flex-direction:column;gap:10px}
.drop-zone{border:2px solid var(--gray-mid);border-radius:var(--radius-sm);padding:12px 14px;min-height:60px;background:#fff;transition:all .2s}
.drop-zone.over{border-color:var(--blue-mid);background:var(--blue-light)}
.dz-label{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-family:'Nunito',sans-serif}
.dz-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:30px}

/* FILL */
.fill-prog{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:12px}
.fill-sentence{font-size:16px;line-height:2.4;color:var(--text);font-weight:600;font-family:'Nunito',sans-serif}
.blank-inp{border:none;border-bottom:3px solid var(--blue-mid);background:transparent;font-size:15px;font-weight:700;color:var(--text);width:140px;text-align:center;outline:none;font-family:'Nunito',sans-serif;padding:0 4px}
.blank-inp.correct{border-color:#3a7d2e;color:#27500A}
.blank-inp.wrong{border-color:#c0392b;color:#7a1a10}
.fill-fb{padding:10px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;margin-top:12px;display:none}
.fill-fb.show{display:block}
.fill-fb.ok{background:#eaf5e3;color:#27500A}
.fill-fb.no{background:#fdecea;color:#7a1a10}

/* BUTTONS */
.btn{padding:9px 22px;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;border:2px solid var(--gray-mid);border-radius:20px;cursor:pointer;background:#fff;color:var(--text);transition:all .2s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#155f94;border-color:#155f94;color:#fff}
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}

/* TOPIC COLORS */
.topic-0 .topic-header{border-left-color:var(--blue)} .topic-0 .act-tab.active{background:var(--blue);border-color:var(--blue)}
.topic-0 .fc-back{background:var(--blue-light)} .topic-0 .card-def{color:var(--blue)}
.topic-1 .topic-header{border-left-color:var(--teal)} .topic-1 .act-tab.active{background:var(--teal);border-color:var(--teal)}
.topic-1 .fc-back{background:var(--teal-light)} .topic-1 .card-def{color:var(--teal)}
.topic-2 .topic-header{border-left-color:var(--green)} .topic-2 .act-tab.active{background:var(--green);border-color:var(--green)}
.topic-2 .fc-back{background:var(--green-light)} .topic-2 .card-def{color:var(--green)}
.topic-3 .topic-header{border-left-color:var(--amber)} .topic-3 .act-tab.active{background:var(--amber);border-color:var(--amber)}
.topic-3 .fc-back{background:var(--amber-light)} .topic-3 .card-def{color:var(--amber)}
.topic-4 .topic-header{border-left-color:var(--purple)} .topic-4 .act-tab.active{background:var(--purple);border-color:var(--purple)}
.topic-4 .fc-back{background:var(--purple-light)} .topic-4 .card-def{color:var(--purple)}
.topic-5 .topic-header{border-left-color:var(--coral)} .topic-5 .act-tab.active{background:var(--coral);border-color:var(--coral)}
.topic-5 .fc-back{background:var(--coral-light)} .topic-5 .card-def{color:var(--coral)}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">
    <div class="app-logo-icon">💧</div>
    <div>
      <div class="app-logo-text" id="hdr-title">Natural Science — Year 5</div>
      <div class="app-logo-sub" id="hdr-sub">Water &amp; Ecosystems</div>
    </div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('pt')">PT</button>
  </div>
</div>

<div class="topic-bar" id="topic-bar"></div>

<div class="main" id="main-content"></div>

<script>
var lang = 'en';
var curTopic = 0;
var curAct = 'flash';

var TOPICS = {
  en: [
    { id:'t0', label:'Water Cycle', color:'topic-0',
      desc:'The continuous movement of water through evaporation, condensation, precipitation and collection.',
      flashcards:[
        {term:'Evaporation',def:'Solar energy heats liquid water, turning it into water vapor (gas).',hint:'Example: puddles disappearing on a sunny day.'},
        {term:'Condensation',def:'Water vapor cools in the atmosphere and forms clouds.',hint:'Example: water droplets on a cold glass.'},
        {term:'Precipitation',def:'Water falls back to Earth as rain, snow, sleet, or hail.',hint:'All forms of water falling from clouds.'},
        {term:'Collection / Runoff',def:'Water gathers in oceans, rivers, lakes or soaks into the ground.',hint:'The cycle starts again from here.'},
        {term:'Transpiration',def:'Plants release water vapor through their leaves into the atmosphere.',hint:'Plants also contribute to the water cycle!'}
      ],
      quiz:[
        {q:'What process turns liquid water into water vapor?',opts:['Condensation','Precipitation','Evaporation','Transpiration'],ans:2},
        {q:'What happens during condensation?',opts:['Water falls as rain','Water vapor forms clouds','Water soaks into the ground','The sun heats the ocean'],ans:1},
        {q:'Which of the following is NOT a type of precipitation?',opts:['Rain','Snow','Evaporation','Hail'],ans:2},
        {q:'Where does collected water go after precipitation?',opts:['Into the clouds','Back to space','Oceans, rivers, lakes or underground','Only underground'],ans:2},
        {q:'What energy source drives evaporation?',opts:['Wind','Solar energy (the sun)','The moon','Rain'],ans:1},
        {q:'Which process represents plants contributing to the water cycle?',opts:['Precipitation','Runoff','Condensation','Transpiration'],ans:3}
      ],
      dragZones:['Evaporation','Condensation','Precipitation','Collection / Runoff'],
      dragItems:[
        {text:'Sun heats water into vapor',zone:0},{text:'Vapor rises and cools to form clouds',zone:1},
        {text:'Water falls as rain or snow',zone:2},{text:'Water flows into rivers and oceans',zone:3},
        {text:'Liquid water becomes a gas',zone:0},{text:'Droplets gather to make clouds',zone:1}
      ],
      fills:[
        {before:'During ',blank:'evaporation',after:', liquid water turns into water vapor.'},
        {before:'When water vapor cools in the atmosphere, ',blank:'condensation',after:' occurs and clouds form.'},
        {before:'Rain, snow and hail are all types of ',blank:'precipitation',after:'.'},
        {before:'Water collected in rivers and oceans is called ',blank:'collection',after:' or runoff.'}
      ]
    },
    { id:'t1', label:'Evaporation', color:'topic-1',
      desc:'Evaporation is a molecular process where heat makes water molecules escape from a liquid surface.',
      flashcards:[
        {term:'Evaporation',def:'Heat makes water molecules move faster until they break away and become gas.',hint:'Not boiling — it happens at the surface, below boiling point.'},
        {term:'Energy Input',def:'Heat (thermal energy) speeds up water molecules so they can escape into the air.',hint:'The sun is the main heat source.'},
        {term:'State Change',def:'Water changes from liquid to gas (water vapor) during evaporation.',hint:'The vapor is invisible — you cannot see it.'},
        {term:'Invisible Journey',def:'Water vapor is an invisible gas that rises up into the atmosphere.',hint:'It eventually forms clouds through condensation.'},
        {term:'Evaporation Facts',def:'It happens everywhere: drying clothes, sweat disappearing, steam from hot drinks.',hint:'Warmer + windier = faster evaporation.'}
      ],
      quiz:[
        {q:'What makes water molecules speed up during evaporation?',opts:['Cold air','Heat (thermal energy)','Wind only','Gravity'],ans:1},
        {q:'Is water vapor visible?',opts:['Yes, it looks like fog','Yes, it looks like steam','No, it is invisible','Only at night'],ans:2},
        {q:'At what surface does evaporation happen?',opts:['Deep underwater','At the bottom of lakes','At the surface of the liquid','Only in oceans'],ans:2},
        {q:'Which is true about evaporation?',opts:['It only happens when water boils','It needs very hot temperatures','It happens at temperatures below boiling','It only happens in the ocean'],ans:2},
        {q:'Why do puddles disappear faster on warm windy days?',opts:['The wind blows water underground','Higher heat and wind speed up evaporation','Cold slows evaporation','Rain absorbs the puddle'],ans:1}
      ],
      dragZones:['Cause','Process','Result'],
      dragItems:[
        {text:'Heat is added to liquid water',zone:0},{text:'Molecules speed up and break bonds',zone:1},
        {text:'Water vapor rises into the air',zone:2},{text:'Sun provides thermal energy',zone:0},
        {text:'Liquid changes to gas',zone:2},{text:'Bonds between molecules break',zone:1}
      ],
      fills:[
        {before:'Evaporation happens at the ',blank:'surface',after:' of a liquid, not at the bottom.'},
        {before:'Water vapor is an ',blank:'invisible',after:' gas that rises into the atmosphere.'},
        {before:'The faster water molecules move, the quicker they ',blank:'evaporate',after:'.'},
        {before:'Puddles disappear because the water ',blank:'evaporates',after:' into the air.'}
      ]
    },
    { id:'t2', label:'Salinity & Water Types', color:'topic-2',
      desc:'Water is classified by its salt content. Salinity affects crops, soil health and ecosystems.',
      flashcards:[
        {term:'Freshwater',def:'Very low salt content (less than 1%). Found in lakes and rivers.',hint:'What we drink!'},
        {term:'Brackish Water',def:'A mix of fresh and salt water. Found in estuaries (where rivers meet the sea).',hint:'In between fresh and salty.'},
        {term:'Saltwater (Marine)',def:'High salt content (about 3.5%). Found in oceans and seas.',hint:'Most of Earth\'s water is saltwater.'},
        {term:'Salt Stress',def:'Most crops cannot grow in water that is too salty.',hint:'Too much salt = plants struggle to survive.'},
        {term:'Sterile Soil',def:'Too much salt in soil over time makes farmland unable to grow anything.',hint:'This is a major problem in dry regions.'}
      ],
      quiz:[
        {q:'What is the salt content of saltwater (marine)?',opts:['Less than 1%','About 3.5%','About 10%','About 50%'],ans:1},
        {q:'What is brackish water?',opts:['Pure freshwater','A mix of fresh and salt water','Very salty deep ocean water','Rainwater'],ans:1},
        {q:'Where is freshwater found?',opts:['Oceans and seas','Estuaries','Lakes and rivers','The deep ocean'],ans:2},
        {q:'How does high salinity affect plant roots?',opts:['It helps roots absorb more water','It pulls water OUT of roots','It makes roots grow faster','It has no effect'],ans:1},
        {q:'What does "sterile soil" mean?',opts:['Soil with too much water','Soil that is too cold','Soil that cannot grow anything due to excess salt','Very fertile soil'],ans:2}
      ],
      dragZones:['Freshwater','Brackish Water','Saltwater'],
      dragItems:[
        {text:'Lakes and rivers',zone:0},{text:'Less than 1% salt',zone:0},
        {text:'Where rivers meet the sea',zone:1},{text:'Mix of fresh and salt',zone:1},
        {text:'Oceans and seas',zone:2},{text:'About 3.5% salt',zone:2}
      ],
      fills:[
        {before:'Water with less than 1% salt is called ',blank:'freshwater',after:'.'},
        {before:'Brackish water is found in ',blank:'estuaries',after:' where rivers meet the sea.'},
        {before:'High salinity pulls water ',blank:'out',after:' of plant roots instead of in.'},
        {before:'Soil that cannot grow anything due to too much salt is called ',blank:'sterile',after:' soil.'}
      ]
    },
    { id:'t3', label:'Dry Seasons & Conservation', color:'topic-3',
      desc:'Dry seasons reduce precipitation significantly, threatening water supplies and ecosystems.',
      flashcards:[
        {term:'Dry Season',def:'A period when precipitation (rain) decreases significantly.',hint:'Opposite of the rainy/wet season.'},
        {term:'The Problem',def:'Without enough rain, water levels in lakes and aquifers drop dangerously.',hint:'The system cannot "recharge" fast enough.'},
        {term:'Aquifer Recharge',def:'Rain soaks into the ground over a long time to refill underground water reserves.',hint:'This process is very slow — takes months or years.'},
        {term:'Water Conservation',def:'Saving and reducing water use to protect supplies.',hint:'We must conserve water even when it rains!'},
        {term:'Recharge Time',def:'Underground water supplies take a long time to refill after being depleted.',hint:'This is why conservation is so important.'}
      ],
      quiz:[
        {q:'What happens to precipitation during a dry season?',opts:['It increases','It stays the same','It decreases significantly','It falls only as snow'],ans:2},
        {q:'What does "recharge the system" mean?',opts:['Replacing water with electricity','Rain refilling lakes and aquifers','Cleaning water in a factory','Installing solar panels on lakes'],ans:1},
        {q:'Why must we save water even when it is raining?',opts:['Rain is dirty','Underground supplies take a long time to refill','Rain is only temporary','Water tanks overflow easily'],ans:1},
        {q:'What drops when there is not enough rain?',opts:['Air temperature','Water levels in lakes and aquifers','Soil temperature','Cloud cover'],ans:1},
        {q:'What is water conservation?',opts:['Using as much water as possible','Drinking only bottled water','Saving and reducing water use','Filtering seawater'],ans:2}
      ],
      dragZones:['Cause of problem','Effect','Solution'],
      dragItems:[
        {text:'Precipitation decreases in dry season',zone:0},{text:'Water levels in lakes drop',zone:1},
        {text:'Aquifers take a long time to refill',zone:1},{text:'Conserve water every day',zone:2},
        {text:'Reduce water use at home',zone:2},{text:'Not enough rain to recharge',zone:0}
      ],
      fills:[
        {before:'During a dry season, ',blank:'precipitation',after:' decreases significantly.'},
        {before:'Water levels in lakes and ',blank:'aquifers',after:' drop when there is not enough rain.'},
        {before:'Underground water supplies take a long ',blank:'time',after:' to refill.'},
        {before:'We need to save water even when it rains because our underground supply needs to ',blank:'recharge',after:'.'}
      ]
    },
    { id:'t4', label:'Water Biomes', color:'topic-4',
      desc:'Water exists in many ecosystems: lentic, lotic, marine and wetlands — each with unique features.',
      flashcards:[
        {term:'Lentic Biomes',def:'Still (non-moving) water environments. Lentic = Lazy. Examples: ponds, lakes, swamps.',hint:'Still water = Lentic. Think: "Lazy Lake".'},
        {term:'Lotic Biomes',def:'Flowing water environments. Lotic = ongoing. Examples: rivers, streams, creeks.',hint:'Moving water = Lotic. Think: "Lots of flow".'},
        {term:'Marine Biomes',def:'Saltwater environments like oceans, seas and gulfs.',hint:'Cover over 70% of Earth\'s surface.'},
        {term:'Gulf',def:'A large body of water almost surrounded by land with a small mouth opening to the ocean.',hint:'Warmer and shallower — great for coral reefs.'},
        {term:'Aquifer',def:'A layer of underground rock or sand that stores water. Rainwater soaks down to refill it.',hint:'Humans drill wells into aquifers for drinking water.'}
      ],
      quiz:[
        {q:'What does "lentic" mean?',opts:['Fast-moving water','Salty water','Still water','Frozen water'],ans:2},
        {q:'Which is an example of a lotic biome?',opts:['A lake','A swamp','A pond','A river'],ans:3},
        {q:'What is an aquifer?',opts:['A type of cloud','Underground rock that stores water','A salt water lake','A water treatment plant'],ans:1},
        {q:'What makes gulfs good habitats?',opts:['They are very deep and cold','They are warm and shallow — good for coral reefs','They have no salt','They are frozen year round'],ans:1},
        {q:'How do aquifers refill?',opts:['From rivers flowing into them','Rainwater soaks through soil into the ground','Snow melts directly into them','Scientists pump water in'],ans:1}
      ],
      dragZones:['Lentic (still)','Lotic (flowing)','Marine (saltwater)'],
      dragItems:[
        {text:'Lakes and ponds',zone:0},{text:'Swamps',zone:0},
        {text:'Rivers and streams',zone:1},{text:'Creeks',zone:1},
        {text:'Oceans and seas',zone:2},{text:'Gulfs',zone:2}
      ],

// State
var state = {};
function initState(ti){
  state[ti] = state[ti] || {
    flash:{idx:0,flipped:false},
    quiz:{idx:0,score:0,answered:false},
    drag:{built:false},
    fill:{idx:0,answered:false}
  };
}

function u(){return UI[lang];}
function t(){return TOPICS[lang][curTopic];}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('hdr-title').textContent=u().hdrTitle;
  document.getElementById('hdr-sub').textContent=u().hdrSub;
  buildTopicBar(); buildMain();
}

function buildTopicBar(){
  var bar=document.getElementById('topic-bar'); bar.innerHTML='';
  TOPICS[lang].forEach(function(tp,i){
    var b=document.createElement('button');
    b.className='topic-tab'+(i===curTopic?' active':'');
    b.textContent=tp.label;
    b.onclick=function(){curTopic=i;curAct='flash';buildMain();buildTopicBar();};
    bar.appendChild(b);
  });
}

function buildMain(){
  initState(curTopic);
  var tp=t(); var ui=u();
  var html='<div class="'+tp.color+'">';
  html+='<div class="topic-header"><h2>'+tp.label+'</h2><p>'+tp.desc+'</p></div>';
  html+='<div class="act-bar">';
  ['flash','quiz','drag','fill'].forEach(function(a,i){
    html+='<button class="act-tab'+(a===curAct?' active':'')+'" onclick="switchAct(\''+a+'\')">'+ui.acts[i]+'</button>';
  });
  html+='</div>';
  html+='<div style="margin-top:18px;">';
  html+=buildFlash(tp,ui);
  html+=buildQuiz(tp,ui);
  html+=buildDrag(tp,ui);
  html+=buildFill(tp,ui);
  html+='</div></div>';
  document.getElementById('main-content').innerHTML=html;
  showAct(curAct);
  if(curAct==='drag') setupDragListeners();
}

function switchAct(a){curAct=a;buildMain();}

function showAct(a){
  ['flash','quiz','drag','fill'].forEach(function(s){
    var el=document.getElementById('act-'+s);
    if(el) el.classList.toggle('active',s===a);
  });
}

// FLASHCARDS
function buildFlash(tp,ui){
  var s=state[curTopic].flash; var cards=tp.flashcards; var c=cards[s.idx];
  return '<div class="act-section'+(curAct==='flash'?' active':'')+'" id="act-flash">'+
    '<div class="fc-wrap" onclick="flipCard()">'+
    '<div class="fc-inner'+(s.flipped?' flipped':'')+'" id="fc-inner">'+
    '<div class="fc-face fc-front"><div class="fc-badge">'+ui.fcFront+'</div><div class="card-term">'+c.term+'</div></div>'+
    '<div class="fc-face fc-back"><div class="fc-badge">'+ui.fcBack+'</div><div class="card-def">'+c.def+'</div><div class="card-hint">'+c.hint+'</div></div>'+
    '</div></div>'+
    '<div class="fc-nav">'+
    '<button class="btn-circle" onclick="event.stopPropagation();prevCard()">←</button>'+
    '<span class="fc-count">'+(s.idx+1)+' / '+cards.length+'</span>'+
    '<button class="btn-circle" onclick="event.stopPropagation();nextCard()">→</button>'+
    '</div>'+
    '<p class="fc-hint-text">'+ui.fcTap+'</p>'+
    '</div>';
}
function flipCard(){var s=state[curTopic].flash;s.flipped=!s.flipped;var el=document.getElementById('fc-inner');if(el)el.classList.toggle('flipped',s.flipped);}
function nextCard(){var s=state[curTopic].flash;s.flipped=false;s.idx=(s.idx+1)%t().flashcards.length;buildMain();}
function prevCard(){var s=state[curTopic].flash;s.flipped=false;s.idx=(s.idx-1+t().flashcards.length)%t().flashcards.length;buildMain();}

// QUIZ
function buildQuiz(tp,ui){
  var s=state[curTopic].quiz;
  if(s.idx>=tp.quiz.length){
    return '<div class="act-section'+(curAct==='quiz'?' active':'')+'" id="act-quiz">'+
      '<div class="score-box">'+
      '<div class="score-circle"><div class="score-num">'+s.score+'/'+tp.quiz.length+'</div></div>'+
      '<div class="score-msg">'+ui.scoreMsg(s.score,tp.quiz.length)+'</div>'+
      '<button class="btn btn-primary" onclick="restartQuiz()">'+ui.btnRestart+'</button>'+
      '</div></div>';
  }
  var q=tp.quiz[s.idx]; var pct=Math.round((s.idx/tp.quiz.length)*100);
  var opts=''; q.opts.forEach(function(o,i){
    opts+='<button class="quiz-opt" id="qo'+i+'" onclick="selectAns('+i+')" '+(s.answered?'disabled':'')+'>'+o+'</button>';
  });
  return '<div class="act-section'+(curAct==='quiz'?' active':'')+'" id="act-quiz">'+
    '<div class="quiz-prog-text">'+(lang==='en'?'Question ':'Pergunta ')+(s.idx+1)+' '+(lang==='en'?'of ':'de ')+tp.quiz.length+'</div>'+
    '<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="quiz-q">'+q.q+'</div>'+
    '<div class="quiz-opts" id="quiz-opts">'+opts+'</div>'+
    '<div class="quiz-fb" id="quiz-fb"></div>'+
    '<div class="btn-row"><button class="btn btn-primary" id="btn-qnext" onclick="nextQuestion()" style="display:none;">'+ui.btnNext+'</button></div>'+
    '</div>';
}
function selectAns(i){
  var s=state[curTopic].quiz; if(s.answered)return;
  var q=t().quiz[s.idx]; s.answered=true;
  document.querySelectorAll('.quiz-opt').forEach(function(b,idx){
    b.disabled=true;
    if(idx===q.ans)b.classList.add('correct');
    else if(idx===i&&i!==q.ans)b.classList.add('wrong');
  });
  var fb=document.getElementById('quiz-fb');
  if(i===q.ans){s.score++;fb.textContent=u().correct;fb.className='quiz-fb show ok';}
  else{fb.textContent=u().wrong+' '+u().answerIs+q.opts[q.ans];fb.className='quiz-fb show no';}
  var nb=document.getElementById('btn-qnext');
  if(nb){nb.style.display='inline-block';nb.textContent=s.idx+1<t().quiz.length?u().btnNext:(lang==='en'?'See results':'Ver resultado');}
}
function nextQuestion(){var s=state[curTopic].quiz;s.idx++;s.answered=false;buildMain();}
function restartQuiz(){state[curTopic].quiz={idx:0,score:0,answered:false};buildMain();}

// DRAG
var dragSrc=null;
function buildDrag(tp,ui){
  var items=tp.dragItems; var zones=tp.dragZones;
  var chips=''; items.forEach(function(it,i){
    chips+='<div class="drag-chip" draggable="true" id="dc'+i+'" data-idx="'+i+'" data-zone="'+it.zone+'">'+it.text+'</div>';
  });
  var dzs=''; zones.forEach(function(z,zi){
    dzs+='<div class="drop-zone" id="dz'+zi+'" data-zone="'+zi+'"><div class="dz-label">'+z+'</div><div class="dz-chips" id="dzc'+zi+'"></div></div>';
  });
  return '<div class="act-section'+(curAct==='drag'?' active':'')+'" id="act-drag">'+
    '<p class="drag-inst">'+ui.dragInst+'</p>'+
    '<div class="drag-bank" id="drag-bank">'+chips+'</div>'+
    '<div class="drop-zones">'+dzs+'</div>'+
    '<div class="btn-row">'+
    '<button class="btn btn-primary" id="btn-check-drag" onclick="checkDrag()">'+ui.btnCheck+'</button>'+
    '<button class="btn" id="btn-reset-drag" onclick="resetDrag()" style="display:none;">'+ui.btnReset+'</button>'+
    '</div></div>';
}
function setupDragListeners(){
  document.querySelectorAll('.drag-chip').forEach(function(el){
    el.addEventListener('dragstart',function(e){dragSrc=el;e.dataTransfer.setData('text',el.id);el.classList.add('dragging');});
    el.addEventListener('dragend',function(){el.classList.remove('dragging');});
  });
  var zones=[document.getElementById('drag-bank')];
  document.querySelectorAll('.drop-zone').forEach(function(z){zones.push(z);});
  zones.forEach(function(z){
    z.addEventListener('dragover',function(e){e.preventDefault();z.classList.add('over');});
    z.addEventListener('dragleave',function(){z.classList.remove('over');});
    z.addEventListener('drop',function(e){
      e.preventDefault();z.classList.remove('over');
      var id=e.dataTransfer.getData('text');
      var el=document.getElementById(id);
      if(!el)return;
      el.classList.remove('correct','wrong');
      var target=z.id==='drag-bank'?z:(z.querySelector('.dz-chips')||z);
      target.appendChild(el);
    });
  });
}
function checkDrag(){
  document.querySelectorAll('.drop-zone').forEach(function(zone){
    var zi=parseInt(zone.dataset.zone);
    zone.querySelectorAll('.drag-chip').forEach(function(chip){
      var correct=parseInt(chip.dataset.zone)===zi;
      chip.classList.toggle('correct',correct);chip.classList.toggle('wrong',!correct);
    });
  });
  document.getElementById('btn-reset-drag').style.display='inline-block';
}
function resetDrag(){buildMain();if(curAct==='drag')setupDragListeners();}

// FILL
function buildFill(tp,ui){
  var s=state[curTopic].fill; var f=tp.fills[s.idx%tp.fills.length];
  return '<div class="act-section'+(curAct==='fill'?' active':'')+'" id="act-fill">'+
    '<div class="fill-prog">'+(lang==='en'?'Question ':'Pergunta ')+(s.idx%tp.fills.length+1)+' '+(lang==='en'?'of ':'de ')+tp.fills.length+'</div>'+
    '<div class="fill-sentence">'+f.before+'<input class="blank-inp" id="fill-inp" type="text" autocomplete="off" />'+f.after+'</div>'+
    '<div class="btn-row">'+
    '<button class="btn btn-primary" id="btn-cf" onclick="checkFill()">'+ui.fillCheck+'</button>'+
    '<button class="btn" id="btn-nf" onclick="nextFill()" style="display:none;">'+ui.fillNext+'</button>'+
    '</div>'+
    '<div class="fill-fb" id="fill-fb"></div>'+
    '</div>';
}
function checkFill(){
  var s=state[curTopic].fill; if(s.answered)return;
  var tp=t(); var f=tp.fills[s.idx%tp.fills.length];
  var inp=document.getElementById('fill-inp'); if(!inp)return;
  var val=inp.value.trim().toLowerCase(); var ans=f.blank.toLowerCase();
  var fb=document.getElementById('fill-fb');
  var ok=val===ans||val===ans.replace(/[^a-záéíóúãõâêôàüç]/g,'');
  if(ok){inp.classList.add('correct');fb.textContent=u().fillCorrect;fb.className='fill-fb show ok';}
  else{inp.classList.add('wrong');fb.textContent=u().fillWrong(f.blank);fb.className='fill-fb show no';}
  s.answered=true;
  document.getElementById('btn-cf').style.display='none';
  var nb=document.getElementById('btn-nf');
  nb.style.display='inline-block';
  nb.textContent=s.idx+1<tp.fills.length?u().fillNext:(lang==='en'?'Restart':'Recomeçar');
}
function nextFill(){
  var s=state[curTopic].fill; s.idx++; s.answered=false; buildMain();
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'){var inp=document.getElementById('fill-inp');if(document.activeElement===inp)checkFill();}});

// INIT
buildTopicBar(); buildMain();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Science — Year 5</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a6faa;--blue-light:#e3f0fa;--blue-mid:#378ADD;--blue-dark:#0e4a73;
  --teal:#0e7a6e;--teal-light:#e0f4f1;--teal-mid:#1aab9b;
  --green:#3a7d2e;--green-light:#eaf5e3;--green-mid:#5aad4a;
  --amber:#b56a00;--amber-light:#fff3e0;--amber-mid:#e08a1a;
  --purple:#5c3d9e;--purple-light:#ede8fb;--purple-mid:#7c5abf;
  --coral:#c0392b;--coral-light:#fdecea;--coral-mid:#e05545;
  --gray:#444;--gray-light:#f5f5f5;--gray-mid:#e0e0e0;--gray-dark:#888;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --shadow:0 2px 16px rgba(0,0,0,0.09);--shadow-sm:0 1px 6px rgba(0,0,0,0.07);
}
body{font-family:'Nunito Sans',sans-serif;background:#eef2f7;color:var(--text);min-height:100vh}
h1,h2,h3,h4,.card-term,.topic-name{font-family:'Nunito',sans-serif}

/* HEADER */
.app-header{background:#fff;border-bottom:1px solid var(--gray-mid);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow-sm)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--blue),var(--teal-mid));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--text);line-height:1.1}
.logo-sub{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.3px}
.lang-toggle{display:flex;gap:3px;background:#f0f0f0;border-radius:20px;padding:3px}
.lang-btn{padding:5px 14px;font-size:12px;font-weight:800;border:none;border-radius:16px;cursor:pointer;background:transparent;color:var(--text3);font-family:'Nunito',sans-serif;transition:all .2s}
.lang-btn.active{background:#fff;color:var(--blue);box-shadow:0 1px 5px rgba(0,0,0,0.13)}

/* TOPIC BAR */
.topic-bar{background:#fff;border-bottom:1px solid var(--gray-mid);padding:0 12px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.topic-bar::-webkit-scrollbar{display:none}
.topic-tab{padding:11px 15px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;border:none;background:transparent;cursor:pointer;color:var(--text3);white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.topic-tab .t-emoji{font-size:14px}
.topic-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* MAIN AREA */
.main{max-width:720px;margin:0 auto;padding:20px 16px 60px}

/* HOME SCREEN */
.home-screen{animation:fadeIn .3s ease}
.home-hero{background:linear-gradient(135deg,var(--blue-dark),var(--blue),var(--teal-mid));border-radius:var(--radius-lg);padding:28px 24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.home-hero::after{content:'💧';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:72px;opacity:.18}
.home-hero h1{font-size:22px;font-weight:900;margin-bottom:6px}
.home-hero p{font-size:14px;opacity:.88;line-height:1.6;max-width:380px}
.study-plan{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:20px}
.study-plan h2{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.study-plan .sp-sub{font-size:13px;color:var(--text3);margin-bottom:16px}
.sp-step{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f0f0f0}
.sp-step:last-child{border-bottom:none;padding-bottom:0}
.sp-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;font-family:'Nunito',sans-serif;flex-shrink:0;color:#fff}
.sp-info h3{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px}
.sp-info p{font-size:12px;color:var(--text2);line-height:1.5}
.sp-tip{background:var(--blue-light);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--blue-dark);font-weight:600;border-left:3px solid var(--blue-mid)}
.topic-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.topic-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;border:2px solid transparent;display:flex;flex-direction:column;gap:8px}
.topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.topic-card .tc-emoji{font-size:28px}
.topic-card .tc-num{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.topic-card h3{font-size:14px;font-weight:800;color:var(--text);line-height:1.3}
.topic-card p{font-size:12px;color:var(--text2);line-height:1.4}
.tc-start{font-size:12px;font-weight:800;margin-top:4px}

/* INTRO SCREEN */
.intro-screen{animation:fadeIn .3s ease}
.intro-back{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--text3);font-family:'Nunito',sans-serif;margin-bottom:16px;padding:0}
.intro-back:hover{color:var(--text)}
.intro-hero{border-radius:var(--radius-lg);padding:26px 24px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.intro-hero::after{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.2}
.intro-hero h2{font-size:20px;font-weight:900;margin-bottom:6px}
.intro-hero .intro-order{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:8px}
.intro-hero p{font-size:14px;opacity:.9;line-height:1.6;max-width:420px}
.reading-card{background:#fff;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.reading-card h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.reading-card h3 span{font-size:18px}
.reading-para{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:10px}
.reading-para:last-child{margin-bottom:0}
.reading-highlight{background:var(--blue-light);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--blue-dark);font-weight:700;margin:12px 0;border-left:3px solid var(--blue-mid);line-height:1.6}
.reading-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:10px 0}
.reading-list li{display:flex;gap:10px;font-size:14px;color:var(--text2);line-height:1.6}
.reading-list li::before{content:'→';color:var(--blue-mid);font-weight:800;flex-shrink:0;margin-top:1px}
.fun-fact{border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;font-weight:700;margin:12px 0;line-height:1.6}
.intro-cta{width:100%;padding:14px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;border:none;border-radius:var(--radius);cursor:pointer;color:#fff;transition:all .2s;margin-top:4px}
.intro-cta:hover{opacity:.9;transform:translateY(-1px)}

/* ACTIVITY SCREEN */
.act-screen{animation:fadeIn .3s ease}
.act-back{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--text3);font-family:'Nunito',sans-serif;margin-bottom:14px;padding:0}
.act-back:hover{color:var(--text)}
.act-header{background:#fff;border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm)}
.act-header-left h3{font-size:15px;font-weight:800;color:var(--text)}
.act-header-left p{font-size:12px;color:var(--text3)}
.act-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.act-tab{padding:7px 14px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;border:2px solid var(--gray-mid);border-radius:20px;background:#fff;cursor:pointer;color:var(--text2);transition:all .2s}
.act-tab.active{color:#fff;border-color:transparent}

/* SECTIONS */
.act-section{display:none}
.act-section.active{display:block}

/* FLASHCARDS */
.fc-wrap{perspective:900px;height:200px;cursor:pointer;margin-bottom:14px}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.fc-front{background:#fff;border:2px solid var(--gray-mid);box-shadow:var(--shadow-sm)}
.fc-back{transform:rotateY(180deg);box-shadow:var(--shadow-sm)}
.fc-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;font-family:'Nunito',sans-serif}
.card-term{font-size:20px;font-weight:900;color:var(--text);line-height:1.3}
.card-def{font-size:14px;font-weight:700;line-height:1.5;margin-bottom:8px}
.card-hint{font-size:12px;color:var(--text2);line-height:1.5;font-style:italic}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:12px}
.fc-count{font-size:13px;color:var(--text3);font-weight:800;min-width:52px;text-align:center;font-family:'Nunito',sans-serif}
.btn-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--gray-mid);background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:700}
.btn-circle:hover{border-color:var(--blue);color:var(--blue)}
.fc-hint-text{font-size:11px;color:var(--text3);text-align:center;margin-top:8px;font-weight:600}

/* QUIZ */
.quiz-prog-wrap{margin-bottom:14px}
.quiz-prog-text{font-size:11px;font-weight:800;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.quiz-prog-bar{background:var(--gray-mid);border-radius:10px;height:6px;overflow:hidden}
.quiz-prog-fill{height:6px;border-radius:10px;transition:width .4s}
.quiz-q{font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px;line-height:1.5;font-family:'Nunito',sans-serif}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{padding:12px 16px;border:2px solid var(--gray-mid);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:700;color:var(--text);background:#fff;text-align:left;font-family:'Nunito Sans',sans-serif;transition:all .2s}
.quiz-opt:hover:not(:disabled){border-color:var(--blue-mid);background:var(--blue-light)}
.quiz-opt.correct{background:#eaf5e3;border-color:#3a7d2e;color:#27500A}
.quiz-opt.wrong{background:#fdecea;border-color:#c0392b;color:#7a1a10}
.quiz-fb{padding:11px 15px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;margin-bottom:10px;display:none;line-height:1.5}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:#eaf5e3;color:#27500A}
.quiz-fb.no{background:#fdecea;color:#7a1a10}
.score-box{text-align:center;padding:30px 20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.score-ring{width:96px;height:96px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;border:4px solid}
.score-num{font-size:28px;font-weight:900;font-family:'Nunito',sans-serif;line-height:1}
.score-denom{font-size:12px;font-weight:700;opacity:.7}
.score-msg{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:18px}

/* DRAG */
.drag-inst{font-size:13px;color:var(--text2);margin-bottom:10px;font-weight:700}
.drag-bank{display:flex;flex-wrap:wrap;gap:7px;padding:12px;border:2px dashed var(--gray-mid);border-radius:var(--radius);min-height:54px;margin-bottom:14px;background:#fff}
.drag-chip{padding:6px 13px;font-size:12px;font-weight:800;border:2px solid var(--gray-mid);border-radius:20px;background:#fff;cursor:grab;color:var(--text);user-select:none;transition:all .2s;font-family:'Nunito',sans-serif}
.drag-chip:hover{border-color:var(--blue);background:var(--blue-light)}
.drag-chip.correct{background:#eaf5e3;border-color:#3a7d2e;color:#27500A;cursor:default}
.drag-chip.wrong{background:#fdecea;border-color:#c0392b;color:#7a1a10}
.drop-zones{display:flex;flex-direction:column;gap:8px}
.drop-zone{border:2px solid var(--gray-mid);border-radius:var(--radius-sm);padding:10px 12px;min-height:58px;background:#fff;transition:all .2s}
.drop-zone.over{border-color:var(--blue-mid);background:var(--blue-light)}
.dz-label{font-size:11px;font-weight:900;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-family:'Nunito',sans-serif}
.dz-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:28px}

/* FILL */
.fill-prog{font-size:11px;font-weight:800;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.fill-sentence{font-size:15px;line-height:2.4;color:var(--text);font-weight:700;font-family:'Nunito',sans-serif}
.blank-inp{border:none;border-bottom:3px solid var(--blue-mid);background:transparent;font-size:14px;font-weight:800;color:var(--text);width:140px;text-align:center;outline:none;font-family:'Nunito',sans-serif;padding:0 4px}
.blank-inp.correct{border-color:#3a7d2e;color:#27500A}
.blank-inp.wrong{border-color:#c0392b;color:#7a1a10}
.fill-fb{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;margin-top:10px;display:none;line-height:1.5}
.fill-fb.show{display:block}
.fill-fb.ok{background:#eaf5e3;color:#27500A}
.fill-fb.no{background:#fdecea;color:#7a1a10}

/* BUTTONS */
.btn{padding:9px 20px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;border:2px solid var(--gray-mid);border-radius:20px;cursor:pointer;background:#fff;color:var(--text);transition:all .2s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{color:#fff;border-color:transparent}
.btn-primary:hover{opacity:.9;color:#fff}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div class="topic-bar" id="topic-bar"></div>

function u(){return UI[lang];}

function tp(){return CONTENT[lang][curTopic];}

function initState(i){
  if(!state[i])state[i]={flash:{idx:0,flipped:false},quiz:{idx:0,score:0,answered:false},fill:{idx:0,answered:false}};
}

// ─── LANGUAGE ───────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('hdr-title').textContent=u().hdrTitle;
  document.getElementById('hdr-sub').textContent=u().hdrSub;
  buildTopicBar();
  if(screen==='home') renderHome();
  else if(screen==='intro') renderIntro();
  else renderAct();
}

// ─── TOPIC BAR ──────────────────────────────────────────────────
function buildTopicBar(){
  var bar=document.getElementById('topic-bar'); bar.innerHTML='';
  // Home tab
  var home=document.createElement('button');
  home.className='topic-tab'+(screen==='home'?' active':'');
  home.innerHTML='🏠';
  home.onclick=function(){screen='home';curTopic=-1;renderHome();buildTopicBar();};
  bar.appendChild(home);
  topics().forEach(function(t,i){
    var b=document.createElement('button');
    b.className='topic-tab'+(curTopic===i&&screen!=='home'?' active':'');
    b.innerHTML='<span class="t-emoji">'+t.emoji+'</span>'+t.label;
    b.onclick=function(){curTopic=i;screen='intro';curAct='read';renderIntro();buildTopicBar();};
    bar.appendChild(b);
  });
}

// ─── INTRO / READING SCREEN ─────────────────────────────────────
function renderIntro(){
  screen='intro'; var t=tp(); var ui=u();

  t.reading.forEach(function(sec){
    var inner='<h3><span>'+sec.icon+'</span> '+sec.title+'</h3>';

    if(sec.paras) sec.paras.forEach(function(p){inner+='<p class="reading-para">'+p+'</p>';});

      inner+='<ul class="reading-list">';
      sec.list.forEach(function(li){inner+='<li>'+li+'</li>';});

    readHtml+='<div class="reading-card">'+inner+'</div>';

// ─── ACTIVITY SCREEN ────────────────────────────────────────────
function renderAct(){
  screen='act'; initState(curTopic);
  var t=tp(); var ui=u();
  var tabsHtml='';
  ['read','flash','quiz','drag','fill'].forEach(function(a,i){
    var lbl=i===0?ui.acts[0]:ui.acts[i];
    tabsHtml+='<button class="act-tab'+(a===curAct?' active':'')+'" style="'+(a===curAct?'background:'+t.accent+';border-color:'+t.accent+';':'')+'" onclick="switchAct(\''+a+'\')">'+lbl+'</button>';
  });
  var sections=buildFlashHTML(t,ui)+buildQuizHTML(t,ui)+buildDragHTML(t,ui)+buildFillHTML(t,ui);
  document.getElementById('main').innerHTML=
    '<div class="act-screen">'+
    '<button class="act-back" onclick="renderIntro();buildTopicBar();">'+ui.backIntro+'</button>'+

      '<div class="act-header-left"><h3>'+t.emoji+' '+t.label+'</h3><p>'+t.order+'</p></div>'+
    '</div>'+
    '<div class="act-bar">'+tabsHtml+'</div>'+
    sections+
    '</div>';
  showActSection(curAct);
  if(curAct==='drag') setupDrag();
}

function switchAct(a){
  if(a==='read'){renderIntro();return;}
  curAct=a; renderAct();
}

function showActSection(a){
  ['flash','quiz','drag','fill'].forEach(function(s){
    var el=document.getElementById('act-'+s);
    if(el)el.classList.toggle('active',s===a);
  });
}

function buildQuizHTML(t,ui){

  if(s.idx>=t.quiz.length){
    var c=t.accent;
    return '<div class="act-section" id="act-quiz">'+
      '<div class="score-box">'+

      '</div></div>';
  }

  });

    '<div class="quiz-prog-wrap">'+

    '<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+pct+'%;background:'+t.accent+';"></div></div>'+
    '</div>'+
    '<div class="quiz-q">'+q.q+'</div>'+
    '<div class="quiz-opts">'+opts+'</div>'+
    '<div class="quiz-fb" id="quiz-fb"></div>'+
    '<div class="btn-row"><button class="btn btn-primary" id="btn-qnext" style="background:'+t.accent+';display:none;" onclick="nextQuestion()">'+ui.btnNext+'</button></div>'+
    '</div>';
}
function selectAns(i){
  var s=state[curTopic].quiz; if(s.answered)return;
  var q=tp().quiz[s.idx]; s.answered=true;
  document.querySelectorAll('.quiz-opt').forEach(function(b,idx){
    b.disabled=true;
    if(idx===q.ans)b.classList.add('correct');
    else if(idx===i&&i!==q.ans)b.classList.add('wrong');
  });
  var fb=document.getElementById('quiz-fb');
  if(i===q.ans){s.score++;fb.textContent=u().correct;fb.className='quiz-fb show ok';}
  else{fb.textContent=u().wrong+u().ansIs+q.opts[q.ans];fb.className='quiz-fb show no';}
  var nb=document.getElementById('btn-qnext');
  if(nb){nb.style.display='inline-block';nb.textContent=s.idx+1<tp().quiz.length?u().btnNext:(lang==='en'?'See results':'Ver resultado');}
}
function nextQuestion(){var s=state[curTopic].quiz;s.idx++;s.answered=false;renderAct();}
function restartQuiz(){state[curTopic].quiz={idx:0,score:0,answered:false};renderAct();}

// ─── DRAG & DROP ────────────────────────────────────────────────
function buildDragHTML(t,ui){
  var items=t.dragItems; var zones=t.dragZones;
  var chips=''; items.forEach(function(it,i){
    chips+='<div class="drag-chip" draggable="true" id="dc'+i+'" data-idx="'+i+'" data-zone="'+it.zone+'">'+it.text+'</div>';
  });
  var dzs=''; zones.forEach(function(z,zi){
    dzs+='<div class="drop-zone" id="dz'+zi+'" data-zone="'+zi+'">'+
      '<div class="dz-label" style="color:'+t.accent+';">'+z+'</div>'+
      '<div class="dz-chips" id="dzc'+zi+'"></div></div>';
  });
  return '<div class="act-section" id="act-drag">'+
    '<p class="drag-inst">'+ui.dragInst+'</p>'+
    '<div class="drag-bank" id="drag-bank">'+chips+'</div>'+
    '<div class="drop-zones">'+dzs+'</div>'+
    '<div class="btn-row">'+
    '<button class="btn btn-primary" style="background:'+t.accent+';" onclick="checkDrag()">'+ui.btnCheck+'</button>'+
    '<button class="btn" id="btn-rdrag" onclick="resetDrag()" style="display:none;">'+ui.btnReset+'</button>'+
    '</div></div>';
}
function setupDrag(){
  document.querySelectorAll('.drag-chip').forEach(function(el){
    el.addEventListener('dragstart',function(e){dragSrc=el;e.dataTransfer.setData('text',el.id);});
    el.addEventListener('dragend',function(){});
  });
  var allZones=[document.getElementById('drag-bank')];
  document.querySelectorAll('.drop-zone').forEach(function(z){allZones.push(z);});
  allZones.forEach(function(z){
    z.addEventListener('dragover',function(e){e.preventDefault();z.classList.add('over');});
    z.addEventListener('dragleave',function(){z.classList.remove('over');});
    z.addEventListener('drop',function(e){
      e.preventDefault();z.classList.remove('over');
      var id=e.dataTransfer.getData('text');
      var el=document.getElementById(id); if(!el)return;
      el.classList.remove('correct','wrong');
      var target=z.id==='drag-bank'?z:(z.querySelector('.dz-chips')||z);
      target.appendChild(el);
    });
  });
}
function checkDrag(){
  document.querySelectorAll('.drop-zone').forEach(function(zone){
    var zi=parseInt(zone.dataset.zone);
    zone.querySelectorAll('.drag-chip').forEach(function(chip){
      var ok=parseInt(chip.dataset.zone)===zi;
      chip.classList.toggle('correct',ok);chip.classList.toggle('wrong',!ok);
    });
  });
  var rb=document.getElementById('btn-rdrag');if(rb)rb.style.display='inline-block';
}
function resetDrag(){renderAct();if(curAct==='drag')setupDrag();}

    '<button class="btn btn-primary" id="btn-cf" style="background:'+t.accent+';" onclick="checkFill()">'+ui.fillCheck+'</button>'+

function checkFill(){
  var s=state[curTopic].fill; if(s.answered)return;
  var f=tp().fills[s.idx%tp().fills.length];
  var inp=document.getElementById('fill-inp'); if(!inp)return;
  var val=inp.value.trim().toLowerCase(); var ans=f.blank.toLowerCase();
  var ok=val===ans||val===ans.replace(/[^a-z0-9áéíóúãõâêôàüç]/g,'');
  var fb=document.getElementById('fill-fb');
  if(ok){inp.classList.add('correct');fb.textContent=u().fillCorrect;fb.className='fill-fb show ok';}
  else{inp.classList.add('wrong');fb.textContent=u().fillWrong(f.blank);fb.className='fill-fb show no';}
  s.answered=true;
  var cf=document.getElementById('btn-cf');if(cf)cf.style.display='none';
  var nf=document.getElementById('btn-nf');if(nf){
    nf.style.display='inline-block';
    nf.textContent=s.idx+1<tp().fills.length?u().fillNext:(lang==='en'?'Restart':'Recomeçar');
  }
}
function nextFill(){
  var s=state[curTopic].fill; s.idx++; s.answered=false; renderAct();
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){var inp=document.getElementById('fill-inp');if(document.activeElement===inp)checkFill();}
});

// ─── INIT ───────────────────────────────────────────────────────
buildTopicBar(); renderHome();
</script>
